name: NSE IV Monitor

on:
  schedule:
    # First runs at 9:15, 9:20, 9:25 IST (3:45, 3:50, 3:55 UTC)
    - cron: '45-59/5 3 * * 1-5'
    # Then every 5 min from 9:30 to 15:30 IST (4:00 to 10:00 UTC)
    - cron: '*/5 4-10 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 👈 Forces Node 24 to avoid deprecation warning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python monitor_iv.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
