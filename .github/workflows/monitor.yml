name: NSE IV Monitor (v3)

on:
  schedule:
    # 9:15 to 15:30 IST, every 5 min
    - cron: '45-59/5 3 * * 1-5'
    - cron: '*/5 4-10 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node warning
    permissions:
      contents: write   # needed to push back iv_history.json and signals.csv
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0   # ensure we can push
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Run IV monitor
        run: python monitor_iv.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
