name: NSE IV Monitor

on:
  schedule:
    # Every 5 minutes from 9:30 AM to 3:30 PM IST, Monday to Friday
    # UTC times: 4:00 to 10:00
    - cron: '*/5 4-10 * * 1-5'
  workflow_dispatch:   # allows you to run manually from GitHub website

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python monitor_iv.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
